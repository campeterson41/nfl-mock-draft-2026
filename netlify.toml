[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

# Tell `netlify dev` to proxy to our pinned Vite port so we don't accidentally
# land on some other local project's dev server (the default 5173 is popular).
[dev]
  framework = "#custom"
  command = "npm run dev"
  targetPort = 5181
  port = 5180

# API functions bind themselves via `export const config = { path: ... }` in
# each function file, so no /api/* redirects needed here. The SPA fallback
# only catches non-API paths.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
