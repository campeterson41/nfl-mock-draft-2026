        <h2 style="font-size:20px;font-weight:800;color:#d4a843;margin-bottom:12px">About the Algorithm</h2>
        <p style="color:#a1a1aa;line-height:1.7;max-width:640px;margin-bottom:24px">
          Each pick is determined by a weighted desire score that combines multiple factors: the
          player's consensus ranking (exponential decay curve), the team's positional need (blended

          The result is the most realistic mock draft simulation available online.
